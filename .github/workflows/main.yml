name: 📆 Финансовый помощник - Отправка напоминаний

on:
  schedule:
    # Запуск каждый день в 10:00 UTC (это 13:00 по Москве)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Ручной запуск для теста

jobs:
  send_reminder:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Загрузка кода репозитория
        uses: actions/checkout@v4

      - name: 🛠 Установка зависимостей (jq для JSON)
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: 📊 Анализ дат и генерация сообщения
        id: finance
        run: |
          #!/bin/bash
          set -e  # Останавливаем скрипт при любой ошибке
          
          # Получаем текущий день месяца
          CURRENT_DAY=$(date +%-d)
          echo "Сегодня число: $CURRENT_DAY"

          # Проверяем, что файл config.json существует
          if [ ! -f config.json ]; then
            echo "❌ ОШИБКА: Файл config.json не найден!"
            exit 1
          fi

          # Читаем бюджет
          BUDGET=$(jq -r '.monthly_budget // "0"' config.json)
          DAYS_BEFORE=$(jq -r '.reminder_days_before // "2"' config.json)
          
          echo "Бюджет: $BUDGET"
          echo "Напоминать за дней: $DAYS_BEFORE"
          
          # Заголовок сообщения
          MESSAGE="💰 *ФИНАНСОВЫЙ ПОМОЩНИК*%0A"
          MESSAGE+="━━━━━━━━━━━━━━━━━━%0A%0A"
          
          # Счетчик активных напоминаний
          COUNT=0
          
          # Получаем количество счетов в массиве
          BILLS_COUNT=$(jq '.bills | length' config.json)
          echo "Найдено счетов: $BILLS_COUNT"
          
          # Парсим JSON и проверяем даты
          for i in $(seq 0 $((BILLS_COUNT - 1))); do
            NAME=$(jq -r ".bills[$i].name" config.json)
            BILL_DAY=$(jq -r ".bills[$i].date" config.json)
            AMOUNT=$(jq -r ".bills[$i].amount" config.json)
            
            echo "Проверяем: $NAME (день: $BILL_DAY, сумма: $AMOUNT)"
            
            # Проверяем, что BILL_DAY - число
            if ! [[ "$BILL_DAY" =~ ^[0-9]+$ ]]; then
              echo "⚠️ Пропускаем $NAME - некорректная дата: $BILL_DAY"
              continue
            fi
            
            # Логика расчета: сколько дней осталось до платежа
            if [ $BILL_DAY -ge $CURRENT_DAY ]; then
              DAYS_LEFT=$((BILL_DAY - CURRENT_DAY))
            else
              # Если дата в следующем месяце (упрощенно считаем 30 дней)
              DAYS_IN_MONTH=30
              DAYS_LEFT=$((DAYS_IN_MONTH - CURRENT_DAY + BILL_DAY))
            fi
            
            echo "  Осталось дней: $DAYS_LEFT"
            
            # Если осталось меньше или равно указанному лимиту дней - показываем
            if [ $DAYS_LEFT -le $DAYS_BEFORE ] && [ $DAYS_LEFT -ge 0 ]; then
              COUNT=$((COUNT + 1))
              echo "  ✅ Добавляем в напоминание"
              
              # Форматируем строку с суммой
              MESSAGE+="📌 *${NAME}*%0A"
              MESSAGE+="   └ 💵 ${AMOUNT} ₽%0A"
              
              if [ $DAYS_LEFT -eq 0 ]; then
                MESSAGE+="   └ ⚡ *СЕГОДНЯ!*%0A%0A"
              elif [ $DAYS_LEFT -eq 1 ]; then
                MESSAGE+="   └ ⏳ *Завтра*%0A%0A"
              else
                MESSAGE+="   └ 🗓 Через ${DAYS_LEFT} дня (до ${BILL_DAY} числа)%0A%0A"
              fi
            fi
          done
          
          # Если напоминаний нет, сообщаем об этом
          if [ $COUNT -eq 0 ]; then
            MESSAGE+="✅ *Отличные новости!*%0A"
            MESSAGE+="В ближайшие ${DAYS_BEFORE} дня срочных платежей нет.%0A%0A"
          fi
          
          # Добавляем информацию о бюджете
          MESSAGE+="━━━━━━━━━━━━━━━━━━%0A"
          MESSAGE+="📊 *Бюджет на месяц:* ${BUDGET} ₽%0A"
          MESSAGE+="🔔 Следующая проверка: завтра в 13:00 МСК"
          
          # Сохраняем сообщение для следующего шага
          # Экранируем специальные символы для GitHub Actions
          echo "text<<EOF" >> $GITHUB_OUTPUT
          echo "$MESSAGE" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          echo "📝 Сгенерировано сообщение длиной: ${#MESSAGE} символов"
          echo "📊 Всего активных напоминаний: $COUNT"

      - name: ✈️ Отправка уведомления в Telegram
        run: |
          MESSAGE_TEXT="${{ steps.finance.outputs.text }}"
          
          # Отправляем запрос
          RESPONSE=$(curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MESSAGE_TEXT" \
            -d parse_mode="Markdown")
          
          # Проверяем ответ
          echo "Ответ от Telegram: $RESPONSE"
          
          if echo "$RESPONSE" | grep -q '"ok":true'; then
            echo "✅ Сообщение успешно отправлено!"
          else
            echo "❌ Ошибка при отправке сообщения"
            exit 1
          fi

      - name: 📝 Запись в лог-файл истории
        run: |
          # Создаем запись в лог
          echo "$(date '+%Y-%m-%d %H:%M:%S') | Проверка выполнена. Активных напоминаний: $COUNT" >> history.log
          
          # Коммитим изменения
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add history.log
          git commit -m "📝 Обновление лога финансового помощника [$(date '+%Y-%m-%d')]" || echo "Нет изменений для коммита"
          git push || echo "Нечего пушить"
        env:
          COUNT: ${{ steps.finance.outputs.count }}
